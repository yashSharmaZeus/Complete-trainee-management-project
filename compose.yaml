services:
  mysql:
    image: docker-registry-002.zeuslearning.com/zeuslearning/mysql
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost","-u","root","-psecret"]
      interval: 10s
      timeout: 5s
      retries: 3
    container_name: mysql_db
    restart: always
    ports:
      - "${MYSQL_LOCAL_PORT}:${MYSQL_VIRTUAL_PORT}"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASS}
      MYSQL_DATABASE: ${MYSQL_DB}
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: docker-registry-002.zeuslearning.com/zeuslearning/redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    container_name: redis_cache
    restart: always
    ports:
      - "${REDIS_LOCAL_PORT}:${REDIS_VIRTUAL_PORT}"
    command: redis-server --requirepass ${REDIS_PASS}
    volumes:
      - redis_data:/data

  rabbitmq:
    image: docker-registry-002.zeuslearning.com/zeuslearning/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    container_name: rabbitmq
    restart: always
    ports:
      - ${RABBITMQ_SERVICE_PORT}:${RABBITMQ_SERVICE_PORT}
      - ${RABBITMQ_UI_PORT}:${RABBITMQ_UI_PORT}
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    configs:
      - source: rabbitmq-plugins
        target: /etc/rabbitmq/enabled_plugins
    volumes:
      - rabbitmq_lib:/var/lib/rabbitmq/
      - rabbitmq_log:/var/log/rabbitmq
  
  TraineeManagement.Api:
    image: traineemanagement.api:latest
    build:
      context: .
      dockerfile: TraineeManagement.Api/Dockerfile
    restart: always
    ports:
      - "8083:8080"
    environment:
      - RabbitMQ__HostName=rabbitmq_server
      - RabbitMQ__UserName=${RABBITMQ_USERNAME}
      - RabbitMQ__Password=${RABBITMQ_PASS}
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./UploadStorage:/app/UploadStorage
 
  TrainingDirectory.Api:
    image: trainingdirectory.api:latest
    build:
      context: .
      dockerfile: TrainingDirectory.Api/Dockerfile
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - TraineeManagement.Api
    volumes:
      - ./UploadStorage:/app/UploadStorage
 
  SubmissionProcessor.Worker:
    image: submissionprocessor.worker:latest
    build:
      context: .
      dockerfile: SubmissionProcessor.Worker/dockerfile
    restart: always
    ports:
      - "8081:8080"
    environment:
      - RabbitMQ__HostName=rabbitmq_server
      - RabbitMQ__UserName=${RABBITMQ_USERNAME}
      - RabbitMQ__Password=${RABBITMQ_PASS}
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
    volumes:
      - ./UploadStorage:/app/UploadStorage
 
 
configs:
  rabbitmq-plugins:
    content: "[rabbitmq_management]."  

volumes:
  mysql_data:
  redis_data:
  rabbitmq_lib:
    driver: local
  rabbitmq_log:
    driver: local